<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Viewport for responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Forces IE to use Edge mode. -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- General SEO Meta Tags -->
    <meta name="description" content="OTL On The Line Communications offers top-notch communication solutions.">
    <meta name="keywords" content="OTL, On The Line Communications, communication services, digital solutions">
    <meta name="author" content="Jennifer Curtis">

    <!-- Open Graph Meta Tags for Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="OTL On The Line Communications">
    <meta property="og:description" content="OTL On The Line Communications offers top-notch communication solutions.">
    <meta property="og:image" content="https://otlcommunications.com/images/otl-logo.png">
    <meta property="og:url" content="https://otlcommunications.com">

    <!-- Favicon -->
    <link rel="icon" type="image/ico" href="favicon.ico">

    <!-- Preload Fonts for Faster Rendering -->
    <link rel="preload" href="https://fonts.googleapis.com/css?family=Roboto:300,400,700&display=swap" as="style">

    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  </head>

  <body>
    <noscript>
      <strong>We're sorry, but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>

    <!-- Main JavaScript -->
    <script type="module" src="/src/main.js"></script>

  </body>
</html>
